name: Revisaurus
description: Generate a static Revisaurus PR review website.
inputs:
  config:
    description: Path to the revisaurus TOML config file.
    required: false
    default: revisaurus.toml
  node-version:
    description: Node.js version used to run Revisaurus.
    required: false
    default: "24"
  base-path:
    description: Base path for generated site assets. Defaults to the repository name on GitHub Pages project sites. Use "/" for a root or custom-domain deployment.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      with:
        run_install: false
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
    - name: Install Kiro CLI
      shell: bash
      run: curl -fsSL https://cli.kiro.dev/install | bash
    # TODO: probably there's a way to avoid installing dependencies when running the action.
    #       I.e. the action start in a more advanced state. So that it's faster.
    - name: Install dependencies
      shell: bash
      run: pnpm --dir "${GITHUB_ACTION_PATH}/.." install --frozen-lockfile
    - name: Build Revisaurus
      shell: bash
      run: pnpm --dir "${GITHUB_ACTION_PATH}/.." build
    - name: Generate Revisaurus site
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        KIRO_API_KEY: ${{ env.KIRO_API_KEY }}
        INPUTS_CONFIG: ${{ inputs.config }}
        REVISAURUS_BASE_PATH: ${{ inputs.base-path }}
      run: node "${GITHUB_ACTION_PATH}/../dist/cli/index.js" generate --config "${INPUTS_CONFIG}"
