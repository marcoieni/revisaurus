name: Revisaur
description: Generate a static Revisaur PR review website.
inputs:
  config:
    description: Path to the revisaur TOML config file.
    required: false
    default: revisaur.toml
  node-version:
    description: Node.js version used to run Revisaur.
    required: false
    default: "24"
  base-path:
    description: Base path for generated site assets. Defaults to the repository name on GitHub Pages project sites. Use "/" for a root or custom-domain deployment.
    required: false
    default: ""
  cache-path:
    description: Directory containing Revisaur review state. Keep this aligned with data_dir in the config file.
    required: false
    default: .revisaur/data
runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
    - name: Restore Revisaur review cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ inputs.cache-path }}
        key: revisaur-reviews-${{ runner.os }}-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          revisaur-reviews-${{ runner.os }}-${{ github.repository_id }}-
    - name: Install Kiro CLI
      shell: bash
      run: curl -fsSL https://cli.kiro.dev/install | bash
    # TODO: probably there's a way to avoid installing dependencies when running the action.
    #       I.e. the action start in a more advanced state. So that it's faster.
    - name: Install dependencies
      shell: bash
      run: pnpm --dir "${GITHUB_ACTION_PATH}/.." install --frozen-lockfile
    - name: Build Revisaur
      shell: bash
      run: pnpm --dir "${GITHUB_ACTION_PATH}/.." build
    - name: Generate Revisaur site
      shell: bash
      env:
        # The generator needs this for GitHub API reads; reviewer subprocesses
        # receive a smaller allowlist instead of inheriting the full job env.
        GITHUB_TOKEN: ${{ github.token }}
        KIRO_API_KEY: ${{ env.KIRO_API_KEY }}
        INPUTS_CONFIG: ${{ inputs.config }}
        REVISAUR_BASE_PATH: ${{ inputs.base-path }}
      run: node "${GITHUB_ACTION_PATH}/../dist/cli/index.js" generate --config "${INPUTS_CONFIG}"
